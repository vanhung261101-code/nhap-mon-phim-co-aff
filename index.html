
<!DOCTYPE html><html class="light" lang="vi"><head>
<meta charset="utf-8"><meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Nhập Môn Phím Cơ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet">
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    "primary": "#00618d", "primary-container": "#5ab9f6", "surface": "#f3f7ff",
                    "surface-container-low": "#e9f1ff", "surface-container-lowest": "#ffffff",
                    "secondary-container": "#ffc787", "tertiary-container": "#ff9473",
                    "on-background": "#0d314e", "on-surface-variant": "#3f5e7e",
                    "outline-variant": "#91b0d3", "secondary": "#825000", "on-secondary": "#fff0e3"
                },
                fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Be Vietnam Pro"] },
                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem"}
            }
        }
    }
</script>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<main class="py-10">
    <section class="px-6 mb-12">
        <div class="relative bg-gradient-to-br from-primary to-primary-container rounded-xl p-8 overflow-hidden flex flex-col items-start gap-4">
            <div class="z-10 max-w-[60%]">
                <h1 class="font-headline font-extrabold text-3xl text-white leading-tight mb-2">Chào mừng anh em bước vào bộ môn "mai thúy nhựa"</h1>
                <p class="text-white/90 text-sm font-medium">Đồ mình dùng có hết ở bên dưới nhé ^^</p>
            </div>
            <img class="absolute -right-4 -bottom-10 h-72 w-64 object-contain drop-shadow-2xl" src="https://cdni.iconscout.com/illustration/premium/thumb/boy-playing-video-game-illustration-download-in-svg-png-gif-formats--joystick-gaming-hobby-gamer-activities-pack-people-illustrations-5219213.png">
            <button class="z-10 mt-2 bg-secondary-container text-on-secondary-container px-6 py-3 rounded-full font-bold text-sm shadow-xl active:scale-95 transition-transform">Xem toàn bộ</button>
        </div>
    </section>
    
    <section class=" mb-10">
      <div class="flex items-center justify-between px-6 mb-4">
        <h2 class="font-headline font-bold text-xl text-on-background">Kit bàn phím</h2>
        <span class="text-primary font-bold text-sm">Xem tất cả</span>
      </div>
      <div class="flex overflow-x-auto gap-4 px-6 hide-scrollbar">
        
    <div class="min-w-[240px] bg-surface-container-low rounded-xl p-4 shadow-sm border border-outline-variant/30">
        <div class="aspect-video bg-surface-container-lowest rounded-lg mb-4 overflow-hidden">
            <img alt="Gateron Milky Yellow" class="w-full h-full object-cover" src="https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-lqd4lw97j2z68e.webp">
        </div>
        <h3 class="font-headline font-bold text-on-background line-clamp-1">Gateron Milky Yellow</h3>
        <p class="text-on-surface-variant text-xs mb-3">Vỏ nhôm chắc chắn</p>
        <div class="flex items-center justify-between mt-auto">
            <span class="font-bold text-primary">3000</span>
            <a href="https://s.shopee.vn/5q3n3M0RaU"><button class="bg-secondary text-on-secondary px-4 py-2 rounded-full text-[10px] font-bold uppercase">Chi tiết</button></a>
        </div>
    </div>
      </div>
    </section>
      <section class="px-6 mb-10">
        <h2 class="font-headline font-bold text-xl text-on-background mb-4">Tìm Switch Ưng Ý</h2>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-primary-container p-4 rounded-lg flex items-center gap-3 active:scale-95 transition-transform">
            <div class="bg-white/30 p-2 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-white">linear_scale</span></div>
            <span class="font-headline font-bold text-on-primary-container">Linear</span>
          </div>
          <div class="bg-tertiary-container p-4 rounded-lg flex items-center gap-3 active:scale-95 transition-transform">
            <div class="bg-white/30 p-2 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-white">touch_app</span></div>
            <span class="font-headline font-bold text-on-tertiary-container">Tactile</span>
          </div>
        </div>
      </section>
    <section class=" mb-10">
      <div class="flex items-center justify-between px-6 mb-4">
        <h2 class="font-headline font-bold text-xl text-on-background">Phụ kiện</h2>
        <span class="text-primary font-bold text-sm">Xem tất cả</span>
      </div>
      <div class="flex overflow-x-auto gap-4 px-6 hide-scrollbar">
        
    <div class="min-w-[160px] bg-surface-container-low rounded-xl p-4 flex flex-col items-center gap-2 shrink-0">
        <div class="aspect-square w-full bg-white rounded-lg overflow-hidden p-2">
            <img alt="Gateron Milky Yellow" class="w-full h-full object-contain" src="https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-lqd4lw97j2z68e.webp">
        </div>
        <h4 class="font-bold text-sm text-center line-clamp-1">Gateron Milky Yellow</h4>
        <span class="text-primary font-bold text-xs">3000</span>
    </div>
    <div class="min-w-[160px] bg-surface-container-low rounded-xl p-4 flex flex-col items-center gap-2 shrink-0">
        <div class="aspect-square w-full bg-white rounded-lg overflow-hidden p-2">
            <img alt="Gateron Milky Yellow" class="w-full h-full object-contain" src="https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-lqd4lw97j2z68e.webp">
        </div>
        <h4 class="font-bold text-sm text-center line-clamp-1">Gateron Milky Yellow</h4>
        <span class="text-primary font-bold text-xs">3000</span>
    </div>
      </div>
    </section>
</main>
</body></html>
